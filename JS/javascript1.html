<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
        let idade=18;
        console.log(idade);
        console.log(typeof idade);
        //=============================================
        console.log("String js")
        let nome="lara"
        console.log(nome);
        console.log(typeof nome);
        //=============================================
        console.log("Boolean")
        let logico=true;
        console.log(logico);
        console.log(typeof logico);
        //=============================================
        let variavelesquecida;
        console.log(typeof variavelesquecida);
        //=============================================
        let telefone=null;
        console.log(typeof telefone);

        //Exemplo trabalhando com Strings
        console.log(`a ${nome} tem ${idade} anos`);

        document.body.innerHTML= `<p> <b> ${nome} </b> tem <mark> ${idade} </mark> anos </p>`;



        let dia=10

        switch(dia){
            case 1:
                console.log("Domingo");
                break;
            case 2:
                console.log("Segunda");
                break;
            case 3:
                console.log("Terça");
                break;
            case 4:
                console.log("Quarta");
                break;
            case 5:
                console.log("Quinta");
                break;
            case 6:
                console.log("Sexta");
                break;
            case 7:
                console.log("Sábado");
                break;
            default:
                console.error("Dia inválido");
        }

        idade=10

        if(idade<12){
            console.log("Criança");
        } else if(idade<18){
            console.log("Adolescente");
        } else if(idade<60){
            console.log("Adulto");
        } else {
            console.log("Idoso");
        }

        const nota = 10;
        if(nota>=9){
            console.log("Execelente");
        }
        else if(nota>=7 && nota<8.9){
            console.log("Bom");
        } else if(nota>=6 && nota<6.9){
            console.log("Regular");
        } else if(nota<6){
            console.log("Reprovado");
        }



        let soma=0;

        for(let i=1; i<=50; i++){
            soma = soma + i;
        }
        console.log('A soma é: ' + soma);
    </script>
</body>
</html>
