<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questão 4c - Centralização com Grid</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background-color: #1b4332;
            display: grid;
            place-items: center;
        }

        .wrapper {
            display: grid;
            place-items: center;
            gap: 12px;
        }

        .foguete {
            font-size: 5rem;
            animation: subir 1.8s ease-in-out infinite;
        }

        .label {
            color: #95d5b2;
            font-family: monospace;
            font-size: 0.85rem;
            background: rgba(0,0,0,0.2);
            padding: 6px 14px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="foguete">🚀</div>
    </div>

</body>
</html>
