<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
    .container{display: flex;
        height: 100vh;
        flex-direction: row;
        justify-content: space-around;
        align-items: center;}
    .box{background-color: rgb(119, 109, 109);
        border: 1px solid orange;
    }
    .box:hover{flex-grow: 5;
        transition: 3s;}
    #box-div-1{order: 5;}
    #box-div-3{order: 4;}
    #box-div-5{order: 5;}
</style>
</head>
<body>
    <div class="container">
        <div class="box" id="box-div-1">1</div>
        <div class="box" id="box-div-2">2</div>
        <div class="box" id="box-div-3">3</div>
        <div class="box" id="box-div-4">4</div>
        <div class="box" id="box-div-5">5</div>
    </div>

    <div class="container">
        <div class="box" id="box-span-1">1</div>
        <div class="box" id="box-span-2">2</div>
        <div class="box" id="box-span-3">3</div>
        <div class="box" id="box-span-4">4</div>
        <div class="box" id="box-span-5">5</div>
    </div>
</body>
</html>
