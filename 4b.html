<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questão 4b - Centralização com Flexbox</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background-color: #0f3460;

            display: flex;
            justify-content: center;
            align-items: center;

            flex-direction: column;
            gap: 12px;
        }

        .foguete {
            font-size: 5rem;
            animation: girar 3s linear infinite;
        }
    </style>
</head>
<body>

    <div class="foguete">🚀</div>
    

</body>
</html>
