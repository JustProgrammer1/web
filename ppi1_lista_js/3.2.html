<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    

    <h1>Tabuada</h1>
    <label for="ntabuada"></label>
    <input type="number" id="ntabuada">
    <button>Calcular</button>
    <div id="tabuada"></div>


    <script>
        let botao = document.querySelector("button");
        botao.addEventListener("click",()=>{
            let numero = Number(ntabuada.value);
            let strResult = `<br>`;
            for (let i=0; i<=10; i++){
                strResult+= `${numero}x${i}=${numero*i}<br>`;
            }
            tabuada.innerHTML = strResult;
        })

    </script>
</body>
</html>
