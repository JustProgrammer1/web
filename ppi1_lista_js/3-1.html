<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #divsoma {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #controlesoma {
            display: flex;
            
        }
    </style>
</head>
<body>
    <h1>Soma de números na interface</h1>

    <div id="divsoma">
        <label for="entradaA">A</label>
        <input type="number" id="entradaA">

        <label for="entradaB">B</label>
        <input type="number" id="entradaB">
        <span>=</span>
        <span id="resultado"></span>
        <br>
        <div id="controlesoma">
            <input id="btn" type="button" value="Somar">
        </div>
        
    </div>
    <script>
        let a,b;
        let inputA = document.querySelector("#entradaA");
        let inputB = document.querySelector("#entradaB");
        let botao = document.getElementById("btn");

        botao.addEventListener("click",()=>{
            a=Number(inputA.value);
            b=Number(inputB.value);
            soma = a+b;
            let spanResult=document.querySelector("#resultado");
            spanResult.innerHTML = soma;
        });

        a=parseInt(inputA.value);
        b=parseInt(inputB.value);
        let soma = a+b;
        let spanResult=document.querySelector("#resultado");

        
    </script>
</body>
</html>
